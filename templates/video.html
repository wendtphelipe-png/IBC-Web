<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{VIDEO_TITLE}} | Oxford Video Library</title>
    <link
        href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <script src="https://player.vimeo.com/api/player.js"></script>
    <style>
        :root {
            --oxford-blue: #001226;
            --deep-blue: #002147;
            --burgundy: #4A0E0E;
            --gold: #D4AF37;
            --cyan: #00F5FF;
            --uv: #9400D3;
            --glass: rgba(0, 33, 71, 0.7);
            --border-gold: rgba(212, 175, 55, 0.3);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--oxford-blue);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
            min-height: 100vh;
        }

        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background:
                radial-gradient(circle at 20% 30%, var(--burgundy) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, var(--uv) 0%, transparent 40%);
            background-blend-mode: overlay;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 5%;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-gold);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'EB Garamond', serif;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: var(--gold);
            text-transform: uppercase;
            text-decoration: none;
        }

        main {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 2rem;
            padding: 2rem 5%;
            max-width: 1800px;
            margin: 0 auto;
        }

        @media (max-width: 1200px) {
            main {
                grid-template-columns: 1fr;
                padding: 1rem;
                gap: 1rem;
            }

            .sidebar {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: var(--oxford-blue);
                z-index: 1000;
                padding: 1rem;
            }

            .sidebar.active {
                display: flex;
            }

            .chapters-card {
                position: relative;
                top: 0;
                max-height: 90vh;
            }

            .video-info {
                padding: 1.5rem;
            }

            .video-info h1 {
                font-size: 1.8rem;
            }
        }

        .read-more-btn {
            display: none;
            background: none;
            border: none;
            color: var(--cyan);
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 1rem;
            text-decoration: underline;
        }

        .player-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .video-container {
            position: relative;
            padding-bottom: 47.8%; /* 56.25 * 0.85 = ~47.8 for 15% reduction */
            height: 0;
            overflow: hidden;
            background: #000;
            border: 1px solid var(--border-gold);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            width: 85%;
            margin: 0 auto;
        }

        @media (max-width: 1200px) {
            .video-container {
                width: 100%;
                padding-bottom: 56.25%;
            }
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .video-info {
            background: var(--glass);
            padding: 2.5rem;
            border: 1px solid var(--border-gold);
            backdrop-filter: blur(20px);
            border-radius: var(--radius);
        }

        .video-info h1 {
            font-family: 'EB Garamond', serif;
            font-size: 2.5rem;
            color: var(--gold);
            margin-bottom: 1rem;
            line-height: 1.1;
        }

        .video-meta {
            display: flex;
            gap: 1.5rem;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1.5rem;
        }

        .video-description {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.8);
            border-left: 2px solid var(--gold);
            padding-left: 1.5rem;
        }

        /* Sidebar - Chapters */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .chapters-card {
            background: var(--glass);
            border: 1px solid var(--border-gold);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 120px);
            position: sticky;
            top: 100px;
        }

        .chapters-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-gold);
            background: rgba(212, 175, 55, 0.05);
        }

        .chapters-header h2 {
            font-family: 'EB Garamond', serif;
            font-size: 1.2rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .chapters-list {
            list-style: none;
            overflow-y: auto;
            flex-grow: 1;
        }

        .chapter-item {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .chapter-item:hover {
            background: rgba(0, 245, 255, 0.05);
            border-left: 3px solid var(--cyan);
        }

        .chapter-time {
            font-family: monospace;
            color: var(--cyan);
            font-size: 0.9rem;
            min-width: 50px;
        }

        .chapter-title {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.8);
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gold);
        }
    </style>
</head>

<body>
    <div class="ambient-bg"></div>

    <nav>
        <div class="logo">IBC TV | OXFORD</div>
        <ul class="nav-links">
            <li><a href="index.html" style="color: var(--cyan); border: 1px solid var(--cyan); padding: 0.5rem 1rem; border-radius: 4px; font-weight: 600;">BACK TO LIBRARY</a></li>
            <li><a href="index.html">7th IBC Oxford World Congress 2026</a></li>
            <li><a href="index.html">IBC News</a></li>
        </ul>
        <button class="cta-btn" style="padding: 0.8rem 1.5rem; border-radius: 8px;">Become a Member</button>
    </nav>

    <main>
        <div class="player-section">
            <div class="video-container" style="border-radius: var(--radius);">
                <iframe id="vimeo-player"
                    src="https://player.vimeo.com/video/{{VIDEO_ID}}?h=0&title=0&byline=0&portrait=0" frameborder="0"
                    allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
            </div>

            <div style="display: flex; gap: 1rem; margin-top: -0.5rem;" class="mobile-only">
                <button onclick="toggleChapters()" class="cta-btn"
                    style="width: 100%; border-radius: 8px; font-size: 0.7rem; border-color: var(--cyan); color: var(--cyan);">View
                    Session Chapters</button>
            </div>

            <div class="video-info">
                <div class="video-meta">
                    <span>Duration: {{VIDEO_DURATION}}</span>
                </div>
                <h1>{{VIDEO_TITLE}}</h1>
                <div class="video-description-container" id="desc-container">
                    <p class="video-description">
                        {{VIDEO_DESCRIPTION}}
                    </p>
                </div>
                <button onclick="toggleDescription()" id="read-more-btn" class="read-more-btn">Read More</button>
            </div>
        </div>

        <aside class="sidebar" id="sidebar">
            <div class="chapters-card" style="border-radius: var(--radius);">
                <div class="chapters-header"
                    style="display: flex; justify-content: space-between; align-items: center;">
                    <h2>Session Chapters</h2>
                    <button class="mobile-only" onclick="toggleChapters()"
                        style="background: none; border: none; color: var(--gold); font-size: 1.5rem;">&times;</button>
                </div>
                <ul class="chapters-list">
                    {{CHAPTERS_LIST}}
                </ul>
            </div>
        </aside>
    </main>

    <script>
        const player = new Vimeo.Player('vimeo-player');

        function seekTo(time) {
            const parts = time.split(':');
            let seconds = 0;
            if (parts.length === 2) {
                seconds = (+parts[0]) * 60 + (+parts[1]);
            } else if (parts.length === 3) {
                seconds = (+parts[0]) * 3600 + (+parts[1]) * 60 + (+parts[2]);
            }
            player.setCurrentTime(seconds);
            player.play();

            if (window.innerWidth <= 1200) {
                toggleChapters();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function toggleChapters() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        function toggleDescription() {
            const container = document.getElementById('desc-container');
            const btn = document.getElementById('read-more-btn');
            container.classList.toggle('expanded');
            btn.textContent = container.classList.contains('expanded') ? 'Read Less' : 'Read More';
        }
    </script>
    <style>
        .mobile-only {
            display: none;
        }

        @media (max-width: 1200px) {
            .mobile-only {
                display: block;
            }
        }
    </style>
</body>

</html>
